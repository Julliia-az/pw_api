<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>Clima</title>
  </head>

  <body>
    <div id="cidade">
      <div id="container">
        <form id="search">
          <i class="fa-solid fa-location-dot"></i>
          <input
            type="search"
            name="cityName"
            id="cityName"
            placeholder="Buscar cidade"
          /><button type="submit">
            <i class="fa-solid fa-magnifying-glass"></i>
          </button>
        </form>
        <div id="dados">
          <div id="weather">
            <h1 id="title">XXXXXX</h1>
            <div id="infos">
              <div id="temp">
                <img id="tempImg" src="" alt="" />
                <div>
                  <p id="tempValue">XX</p>
                  <p id="temDescription">Nublado</p>
                </div>
              </div>
              <div id="otherInfos">
                <div class="info">
                  <i id="tempMaxIcon" class="fa-solid fa-temperature-high"></i>
                  <div>
                    <h2>Temp. max</h2>
                    <p id="tempMax">XX</p>
                  </div>
                </div>
                <div class="info">
                  <i id="tempMinIcon" class="fa-solid fa-temperature-low"></i>
                  <div>
                    <h2>Temp. min</h2>
                    <p id="tempMin">XX</p>
                  </div>
                </div>
                <div class="info">
                  <i id="humidityIcon" class="fa-solid fa-droplet"></i>
                  <div>
                    <h2>Humidade</h2>
                    <p id="humidity">XX</p>
                  </div>
                </div>
                <div class="info">
                  <i id="windIcon" class="fa-solid fa-wind"></i>
                  <div>
                    <h2>Vento</h2>
                    <p id="wind">XX</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div id="airPollution">
            <div id="quality">
              <div id="infoQ">
                <i id="aqiIcon" class="fa-solid fa-ranking-star"></i>
                <div>
                  <h2>Qualidade do ar:</h2>
                  <p id="aqi">XX</p>
                </div>
              </div>
            </div>
          </div>
          <div id="forecast">
            <div id="predictions">
              <div class="infoP">
                <div class="dateInfo">
                  <h2 class="weekday">Seg</h2>
                  <p class="date">16/03</p>
                </div>
                <img class="forecastIcon" src="" alt="" />
                <h3 id="climaP">23</h3>
                <div class="rain">
                  <i class="fa-solid fa-cloud-showers-heavy"></i>
                  <p class="rainPorcent">40</p>
                </div>
              </div>
              <div class="infoP">
                <div class="dateInfo">
                  <h2 class="weekday">Ter</h2>
                  <p class="date">16/03</p>
                </div>
                <img class="forecastIcon" src="" alt="" />
                <h3 id="climaP">23</h3>
                <div class="rain">
                  <i class="fa-solid fa-cloud-showers-heavy"></i>
                  <p class="rainPorcent">40</p>
                </div>
              </div>
              <div class="infoP">
                <div class="dateInfo">
                  <h2 class="weekday">Qua</h2>
                  <p class="date">16/03</p>
                </div>
                <img class="forecastIcon" src="" alt="" />
                <h3 id="climaP">23</h3>
                <div class="rain">
                  <i class="fa-solid fa-cloud-showers-heavy"></i>
                  <p class="rainPorcent">40</p>
                </div>
              </div>
              <div class="infoP">
                <div class="dateInfo">
                  <h2 class="weekday">Qui</h2>
                  <p class="date">16/03</p>
                </div>
                <img class="forecastIcon" src="" alt="" />
                <h3 id="climaP">23</h3>
                <div class="rain">
                  <i class="fa-solid fa-cloud-showers-heavy"></i>
                  <p class="rainPorcent">40</p>
                </div>
              </div>
              <div class="infoP">
                <div class="dateInfo">
                  <h2 class="weekday">Sex</h2>
                  <p class="date">16/03</p>
                </div>
                <img class="forecastIcon" src="" alt="" />
                <h3 id="climaP">23</h3>
                <div class="rain">
                  <i class="fa-solid fa-cloud-showers-heavy"></i>
                  <p class="rainPorcent">40</p>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div id="alert"></div>
      </div>
    </div>
    <script type="module" src="js/main.js"></script>
  </body>
</html>
