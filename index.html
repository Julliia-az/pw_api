<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="css/style.css" />
  <title>Clima</title>
</head>

<body>
  <main>
    <section class="background">
      <section class="sectionClima">
        <div class="navBar">
          <div class="menu"><img src="img/menu-burger.png" alt=""></div>
          <div class="search"><img src="img/search.png" alt="search icon"></div>
        </div>
        <div class="clima">
          <p class="data">Sunday, September 6, 2020</p>
          <h3 class="cidade"><span>Cilegon</span> Banten</h3>
          <div class="temperatura">
            <h2 class="graus">30</h2>
            <p class="ceusius">°C</p>
          </div>
          <p class="tempo"><span>Sunny Cloudy</span></p>
        </div>
      </section>
      <section class="sectionCalendar"></section>
      <section class="sectionNoticias"></section>
    </section>
  </main>
</body>

</html>
