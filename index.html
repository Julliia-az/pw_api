<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>Clima</title>
  </head>
  <body>
    <div id="container">
      <form id="search">
        <i class="fa-solid fa-location-dot"></i>
        <input
          type="search"
          name="cityName"
          id="cityName"
          placeholder="Buscar cidade"
        /><button type="submit">
          <i class="fa-solid fa-magnifying-glass"></i>
        </button>
      </form>
      <div id="weather" class="show">
        <h1 id="title">Nova Odessa, SP</h1>
        <div id="infos">
          <div id="temp">
            <img src="" alt="" />
            <div>
              <p id="tempValue">22 <sup>°C</sup></p>
              <p id="temDescription">Nublado</p>
            </div>
          </div>
          <div id="otherInfos">
            <div class="info">
              <i id="tempMaxIcon" class="fa-solid fa-temperature-high"></i>
              <div>
                <h2>Temp. max</h2>
                <p id="tempMax">24 <sup>°C</sup></p>
              </div>
            </div>
            <div class="info">
              <i id="tempMinIcon" class="fa-solid fa-temperature-low"></i>
              <div>
                <h2>Temp. min</h2>
                <p id="tempMin">18 <sup>°C</sup></p>
              </div>
            </div>
            <div class="info">
              <i id="humidityIcon" class="fa-solid fa-droplet"></i>
              <div>
                <h2>Humidade</h2>
                <p id="humidity">24 <sup>°C</sup></p>
              </div>
            </div>
            <div class="info">
              <i id="windIcon" class="fa-solid fa-wind"></i>
              <div>
                <h2>Vento</h2>
                <p id="wind">24 Km/h</p>
              </div>
            </div>
          </div>
        </div>
      </div>
      <dic id="alert"></dic>
    </div>
    <script src="js/script.js"></script>
  </body>
