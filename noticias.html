<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <title>Notícias da Cidade</title>
    <style>
        body {
            font-family: Arial;
            max-width: 800px;
            margin: auto;
        }

        input {
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px;
        }

        .noticia {
            border-bottom: 1px solid #ccc;
            margin-top: 20px;
            padding-bottom: 10px;
        }
    </style>
</head>

<body>

    <h1>Buscar notícias por cidade</h1>

    <input type="text" id="cidade" placeholder="Digite uma cidade">
    <button onclick="buscarNoticias()">Buscar</button>

    <div id="resultados"></div>

    <script>const API_KEY = "yAJDwyNvrvRnOQ6K0OPqrf8ztY7KMn2sMqiFbUhJBImpzVWBeDxUfU1NW8xV2IKu";

        async function buscarNoticias() {

            const cidade = document.getElementById("cidade").value;

            const url = `https://api.nytimes.com/svc/search/v2/articlesearch.json?q=${cidade}&api-key=${API_KEY}`;

            const resposta = await fetch(url);
            const dados = await resposta.json();

            const artigos = dados.response.docs;

            const resultados = document.getElementById("resultados");
            resultados.innerHTML = "";

            artigos.slice(0, 10).forEach(artigo => {

                const titulo = artigo.headline.main;
                const resumo = artigo.abstract;
                const link = artigo.web_url;

                resultados.innerHTML += `
        <div class="noticia">
            <h2>${titulo}</h2>
            <p>${resumo}</p>
            <a href="${link}" target="_blank">Ler notícia</a>
        </div>
        `;
            });
        }</script>
</body>

</html>
